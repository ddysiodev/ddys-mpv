name: build

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: sudo apt-get update && sudo apt-get install -y lua5.4
      - run: luac5.4 -p scripts/ddys-mpv.lua
      - run: node tools/check.mjs
      - run: node tests/run.mjs
      - run: pwsh -NoProfile -ExecutionPolicy Bypass -File tools/build-package.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: ddys-mpv-v0.1.1
          path: |
            releases/ddys-mpv-v0.1.1.zip
            releases/ddys-mpv-v0.1.1.zip.sha256
